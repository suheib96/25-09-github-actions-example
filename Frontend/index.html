<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Webseite</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,.35);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            color: #cbd5e1;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .button {
            display: inline-block;
            text-decoration: none;
            background: #3b82f6;
            color: white;
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            transition: .25s;
        }

        .button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="background-color: red;">Willkommen 👋 Heute ist der 10.07.2026</h1>
        <p>
            Dies ist eine moderne HTML-Seite mit einem minimalistischen Design.
            Sie kann als Ausgangspunkt für eigene Projekte dienen.
        </p>
        <p> Mein zweiter paragraph</p>
        <a href="#" class="button">Los geht's</a>
    </div>

</body>
</html>
